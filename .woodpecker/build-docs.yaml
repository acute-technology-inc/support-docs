when:
  - event: pull_request
  - event: manual
  - event: push
    branch: main
  - event: tag

variables:
  # NAS PATH for Manual builds
  - &NAS_MANUAL_PATH "/mnt/BuildBot/Builds/${CI_REPO_NAME}/Build-${CI_PIPELINE_NUMBER}-${CI_COMMIT_BRANCH}-${CI_COMMIT_SHA:0:16}/"
  # NAS PATH for PR builds
  - &NAS_PR_PATH "/mnt/BuildBot/Builds/${CI_REPO_NAME}/PR-${CI_COMMIT_PULL_REQUEST}-${CI_COMMIT_SOURCE_BRANCH}/"
  # NAS PATH for main release
  - &NAS_MAIN_PATH "/mnt/BuildBot/Release/${CI_REPO_NAME}/main/"
  # NAS PATH for tag release
  - &NAS_TAG_PATH "/mnt/BuildBot/Release/${CI_REPO_NAME}/${CI_COMMIT_TAG}/"
  # NAS PATH for release internal
  - &NAS_RELEASE_INTERNAL_PATH "/mnt/BuildBot/site/ladocs/"

labels:
  hostname: "acute-linux-agent"
  
steps:
  build-docs-pr:
    image: aqdocker.acute-dev.io/pxlib_build_env:v1.0.1
    environment:
      NAS_PATH: *NAS_PR_PATH
    when:
      - event: pull_request
    commands:
      - uv sync --dev
      - uv run make build-strict
      - tar -czf docs.tar.gz site
      - mkdir -p $NAS_PATH
      - cp docs.tar.gz $NAS_PATH

  build-docs-manual:
    image: aqdocker.acute-dev.io/pxlib_build_env:v1.0.1
    environment:
      NAS_PATH: *NAS_MANUAL_PATH
    when:
      - event: manual
    commands:
      - uv sync --dev
      - uv run make build-strict
      - tar -czf docs.tar.gz site
      - mkdir -p $NAS_PATH
      - cp docs.tar.gz $NAS_PATH

  build-docs-release-internal:
    image: aqdocker.acute-dev.io/pxlib_build_env:v1.0.1
    environment:
      NAS_PATH: *NAS_MAIN_PATH
      NAS_RELEASE_INTERNAL_PATH: *NAS_RELEASE_INTERNAL_PATH
    when:
      - event: push
        branch: main
    commands:
      - uv sync --dev
      - uv run make build-strict
      - tar -czf docs.tar.gz site
      - mkdir -p $NAS_PATH
      - cp docs.tar.gz $NAS_PATH
      - rm -r /mnt/BuildBot/site/ladocs/*
      - cp -R site/* $NAS_RELEASE_INTERNAL_PATH

  publish-docs:
    image: aqdocker.acute-dev.io/pxlib_build_env:v1.0.1
    environment:
      GITHUB_USERNAME:
        from_secret: ACUTETECHNOLGYINC_GITHUB_USERNAME
      GITHUB_TOKEN:
        from_secret: ACUTETECHNOLGYINC_GITHUB_TOKEN
    when:
      - event: tag
    commands:
      - apk update && apk add git
      - uv run make build-strict
      - git config --local user.email "sdk@acute.com.tw"
      - git config --local user.name $GITHUB_USERNAME
      - git config --list --local
      - git remote add docs "https://$GITHUB_USERNAME:$GITHUB_TOKEN@github.com/acute-technology-inc/support-docs.git"
      - git remote -v
      - uv run mkdocs gh-deploy --force --remote-name docs --remote-branch main -m "update docs" -c -v
